apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops
  labels:
    app: devops
    release-date: "2026-07-01"
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
        svc: frontend
        release-date: "2026-07-01"
    spec:
      containers:
        - name: devops-server
          image: zhekis/devops:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: service-devops
  labels:
    app: devops
  namespace: devops
spec:
  type: LoadBalancer
  selector:
    app: devops
    svc: frontend
  ports:
    - port: 12345
      targetPort: 8000
  externalIPs:
    - 172.22.44.225